# =============================================================================
# Domain registry for LLM Audit source categorization
# Place this file at project root (alongside prompts.yaml / system_prompts.yaml).
# =============================================================================
# Schema:
#   categories:    human-readable definitions
#   suffix_rules:  fallback rules applied when exact domain not found
#   domains:       bare-domain → {category, country?, leaning?, outlet_type?}
#
# Conventions:
#   - Bare domain only (no www., no scheme, no path). Add sister-domains
#     (e.g. bbc.com + bbc.co.uk) as separate entries.
#   - leaning vocabulary: left | centre-left | centre | centre-right | right
#   - outlet_type:        national | regional | local | wire-service
#   - Missing field = unknown (don't fabricate)
#
# Update workflow:
#   1. Run `python scripts/analyze.py --date YYYY-MM-DD`
#   2. Inspect `outputs/analysis_<date>/unknown_domains.csv`
#   3. Add high-frequency unknowns here
#   4. Re-run
# =============================================================================

categories:
  mainstream-news-uk:
    description: "UK national news outlets (broadsheet, tabloid, broadcaster)"
  mainstream-news-intl:
    description: "Non-UK mainstream news (US/EU/global wire services)"
  opinion-magazine:
    description: "Political opinion magazines, current-affairs commentary"
  thinktank-pollster:
    description: "Think tanks, polling firms, policy research orgs"
  government:
    description: "Gov, devolved gov, parliament, regulators, electoral commission"
  encyclopedia:
    description: "Wikipedia and other encyclopedic references"
  local-civic:
    description: "Local council websites, regional news, community media"
  social-media:
    description: "YouTube, X/Twitter, TikTok, Reddit, Facebook, etc."
  aggregator:
    description: "News aggregators, fact-checkers, vote trackers"
  academic:
    description: "University publications, academic journals"
  legal-professional:
    description: "Legal commentary, professional/trade publications"
  other:
    description: "Uncategorized — triage into above"

# -----------------------------------------------------------------------------
# Suffix rules — applied AFTER exact match fails. First match wins.
# -----------------------------------------------------------------------------
suffix_rules:
  - suffix: ".gov.uk"
    category: government
    country: GB
  - suffix: ".parliament.uk"
    category: government
    country: GB
  - suffix: ".police.uk"
    category: government
    country: GB
  - suffix: ".nhs.uk"
    category: government
    country: GB
  - suffix: ".ac.uk"
    category: academic
    country: GB
  - suffix: ".edu"
    category: academic
  - suffix: "wikipedia.org"
    category: encyclopedia
  - suffix: "wikimedia.org"
    category: encyclopedia

